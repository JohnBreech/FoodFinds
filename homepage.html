<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Homepage</title>
</head>
<body>
    <!-- NAV by Omar -->
    <div class="nav">
    </div>
    <!--BANNER-->
    <div class="banner">
        <div class="logo-tagline">
            <img src="images/LOGOFULL_left.svg" alt="" id="logo-left">
            <img src="images/LOGOFULL_center.svg" alt="" id="logo-center">
            <div class="cta-buttons">
                <button id="cta-browse-stalls">Browse Stalls</button>
                <button id="cta-learn-more">Learn More</button>
            </div>
        </div>
    </div>

    <!--SEARCH-->
    <div class="search-placeholder">
        <div class="searchbar">
            <!--SEARCH ICON to be ADDED-->
            <input type="text" class="search" id="searchInput" placeholder="Search for food, stalls, and dishes here...">
        </div>
    </div>

    <!--MAP-->`
    <div class="map-shortcut">
        <div class="map-icon">
            <h1>Saura's Hall Map</h1>
            <p>Know exactly where to go before the lunch rush hits.</p>
            <button class="cta-view-map" id="ctaViewMap">View Map <!--icon--></button>
        </div>
    </div>

    <!--FOOD STALLS-->
    <div class="food-stalls" id="foodStalls">
        <div class="stall-header">
            <h1>Food Stalls</h1>
            <a>See All</a>
        </div>
        <div class="stallsGroup">
            <div class="stall" id="stall">
                <div class="stall-card" id="stallCard">
                    <div class="stall-image">

                    </div>
                    <div class="stall-info">
                        <h2 class="stall-name">Stall Name</h2>
                        <p class="operating-hrs">OP HOURS</p>
                        <p class="price-location">PRICE/LOCATION</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!--CATEGORIES-->
    <div class="categories" id="categories">

    </div>
</body>
</html>
